name: Deploy DAOwidget

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'
          cache: 'npm'

      - name: Generate version
        id: version
        run: |
          VERSION=$(date -u +%Y%m%d%H%M)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Generated version: $VERSION"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -d "build" ]; then
            echo "Error: build directory not found"
            exit 1
          fi
          if [ ! -f "build/index.html" ]; then
            echo "Error: build/index.html not found"
            exit 1
          fi
          echo "Build output verified"

      - name: Create info.json
        run: |
          cat > info.json << EOF
          {
            "version": "${{ env.VERSION }}",
            "timestamp": $(date +%s),
            "download_url": "https://farm.wpmix.net/updates/daofactory-v${{ env.VERSION }}.zip",
            "changelog": "${{ github.event.head_commit.message }}",
            "requires": "5.0",
            "tested": "6.4",
            "package": "https://farm.wpmix.net/updates/daofactory-v${{ env.VERSION }}.zip"
          }
          EOF
          cat info.json

      - name: Create WordPress plugin package
        run: |
          # Create temporary directory for packaging
          mkdir -p daofactory-package

          # Copy React build
          cp -r build daofactory-package/

          # Copy WordPress wrapper files
          cp daofactory.php daofactory-package/
          cp -r inc daofactory-package/
          if [ -d "wordpress" ]; then
            cp -r wordpress daofactory-package/
          fi

          # Copy metadata
          cp info.json daofactory-package/
          if [ -f "readme.txt" ]; then
            cp readme.txt daofactory-package/
          fi

          # Create ZIP
          cd daofactory-package
          zip -r ../daofactory-v${{ env.VERSION }}.zip .
          cd ..

          # Verify ZIP
          if [ ! -f "daofactory-v${{ env.VERSION }}.zip" ]; then
            echo "Error: ZIP file not created"
            exit 1
          fi

          echo "Package created: daofactory-v${{ env.VERSION }}.zip"
          ls -lh daofactory-v${{ env.VERSION }}.zip

      - name: Upload WordPress plugin to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "daofactory-v${{ env.VERSION }}.zip,info.json"
          target: "/home/farmFactory/incoming/"

      - name: Update info.json on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p /var/www/html/daofactory
            cp /home/farmFactory/incoming/info.json /var/www/html/daofactory/info.json
            chmod 644 /var/www/html/daofactory/info.json
            echo "info.json updated"
            cat /var/www/html/daofactory/info.json

      - name: Deploy static demo files
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "build/*"
          target: "/var/www/html/daofactory-demo/"
          strip_components: 1
          rm: true

      - name: Health check
        run: |
          echo "Waiting 10 seconds for deployment to settle..."
          sleep 10

          # Check if info.json is accessible
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://farm.wpmix.net/daofactory/info.json || echo "000")

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✓ Health check passed (HTTP $HTTP_CODE)"
          else
            echo "⚠ Warning: Health check returned HTTP $HTTP_CODE (non-blocking)"
          fi

      - name: Deploy to appsource/dao
        continue-on-error: true
        run: |
          # Clone appsource/dao
          git clone https://${{ secrets.APPSOURCE_TOKEN }}@github.com/appsource/dao.git appsource-dao

          # Copy build files
          rsync -av --delete build/ appsource-dao/ --exclude='.git' --exclude='README.md'

          # Commit and push
          cd appsource-dao
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Auto-deploy from DAOwidget v${{ env.VERSION }}

          Deployed: $(date '+%Y-%m-%d %H:%M:%S')

          Co-Authored-By: Claude Sonnet 4.5 <noreply@anthropic.com>" || echo "No changes"
          git push

      - name: Notify completion
        if: success()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✓ DAOwidget deployment complete"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Version: ${{ env.VERSION }}"
          echo "WordPress ZIP: daofactory-v${{ env.VERSION }}.zip"
          echo "Download: https://farm.wpmix.net/updates/daofactory-v${{ env.VERSION }}.zip"
          echo "Demo: https://farm.wpmix.net/daofactory/"
          echo "Appsource: https://appsource.github.io/dao"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Notify failure
        if: failure()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✗ DAOwidget deployment failed"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Version: ${{ env.VERSION }}"
          echo "Check workflow logs for details"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
