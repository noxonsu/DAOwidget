name: Deploy DAOwidget

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Generate version
        id: version
        run: |
          VERSION="2.$(date -u +%y.%m%d)"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Generated version: $VERSION"

      - name: Install dependencies
        run: npm install

      - name: Build
        env:
          CI: false
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -d "build" ]; then
            echo "Error: build directory not found"
            exit 1
          fi
          if [ ! -f "build/index.html" ]; then
            echo "Error: build/index.html not found"
            exit 1
          fi
          echo "Build output verified"

      - name: Create info.json
        run: |
          cat > info.json << EOF
          {
            "name": "DAO Factory",
            "version": "${{ env.VERSION }}",
            "tested": "6.4",
            "requires": "5.0",
            "requires_php": "7.1",
            "download_url": "https://farm.wpmix.net/updates/daofactory-v${{ env.VERSION }}.zip",
            "last_updated": "$(date -u +"%Y-%m-%d %H:%M:%S")",
            "sections": {
              "description": "Governance and proposals plugin for cryptocurrency tokens - create DAOs and voting mechanisms",
              "installation": "Upload the plugin files to /wp-content/plugins/daofactory/, then activate the plugin through the Plugins menu in WordPress",
              "changelog": "<h4>${{ env.VERSION }}</h4><ul><li>$(echo '${{ github.event.head_commit.message }}' | head -1)</li></ul>"
            }
          }
          EOF

          echo "Generated info.json:"
          cat info.json | jq . || cat info.json
          echo "Validating JSON..."
          cat info.json | jq . > /dev/null && echo "✓ Valid JSON" || (echo "✗ Invalid JSON" && exit 1)

      - name: Create WordPress plugin package
        run: |
          echo "Creating WordPress plugin package..."

          # Create package directory with plugin subdirectory (WordPress standard)
          mkdir -p daofactory-package/daofactory

          # Copy all WordPress plugin files from wordpress/ directory
          echo "Copying WordPress plugin files..."
          cp -r wordpress/* daofactory-package/daofactory/

          # Copy React build to build directory
          echo "Copying React build..."
          cp -r build daofactory-package/daofactory/

          # Copy lang directory if exists (translations)
          if [ -d "lang" ]; then
            echo "Copying lang directory..."
            cp -r lang daofactory-package/daofactory/
          fi

          # Copy additional files if they exist
          if [ -f "README.md" ]; then
            cp README.md daofactory-package/daofactory/
          fi
          if [ -f "LICENSE" ]; then
            cp LICENSE daofactory-package/daofactory/
          fi

          # Verify structure
          echo "Package structure:"
          ls -la daofactory-package/daofactory/ | head -20

          # Create ZIP (from package directory, so daofactory/ is the root in ZIP)
          cd daofactory-package
          zip -r ../daofactory-v${{ env.VERSION }}.zip daofactory
          cd ..

          # Verify ZIP
          if [ ! -f "daofactory-v${{ env.VERSION }}.zip" ]; then
            echo "Error: ZIP file not created"
            exit 1
          fi

          echo "Package created: daofactory-v${{ env.VERSION }}.zip"
          ls -lh daofactory-v${{ env.VERSION }}.zip
          echo "ZIP contents:"
          unzip -l daofactory-v${{ env.VERSION }}.zip | head -30

      - name: Upload WordPress plugin to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "daofactory-v${{ env.VERSION }}.zip,info.json"
          target: "/home/farmFactory/incoming/"

      - name: Update info.json on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p /var/www/html/daofactory
            cp /home/farmFactory/incoming/info.json /var/www/html/daofactory/info.json
            chmod 644 /var/www/html/daofactory/info.json
            echo "info.json updated"
            cat /var/www/html/daofactory/info.json

      - name: Deploy WordPress plugin ZIP to updates directory
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Create updates directory if it doesn't exist
            mkdir -p /home/farmFactory/web/farm.wpmix.net/public_html/updates

            # Move ZIP file from incoming to updates
            mv /home/farmFactory/incoming/daofactory-v${{ env.VERSION }}.zip \
               /home/farmFactory/web/farm.wpmix.net/public_html/updates/

            # Set permissions
            chmod 644 /home/farmFactory/web/farm.wpmix.net/public_html/updates/daofactory-v${{ env.VERSION }}.zip

            echo "WordPress plugin package deployed:"
            ls -lh /home/farmFactory/web/farm.wpmix.net/public_html/updates/daofactory-v${{ env.VERSION }}.zip

      - name: Deploy static demo files
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "build/*"
          target: "/var/www/html/daofactory-demo/"
          strip_components: 1
          rm: true

      - name: Health check
        run: |
          echo "Waiting 10 seconds for deployment to settle..."
          sleep 10

          # Check if info.json is accessible
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://farm.wpmix.net/daofactory/info.json || echo "000")

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✓ Health check passed (HTTP $HTTP_CODE)"
          else
            echo "⚠ Warning: Health check returned HTTP $HTTP_CODE (non-blocking)"
          fi

      - name: Notify completion
        if: success()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✓ DAOwidget deployment complete"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Version: ${{ env.VERSION }}"
          echo "WordPress ZIP: daofactory-v${{ env.VERSION }}.zip"
          echo "Download: https://farm.wpmix.net/updates/daofactory-v${{ env.VERSION }}.zip"
          echo "Demo: https://farm.wpmix.net/daofactory/"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Notify failure
        if: failure()
        run: |
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✗ DAOwidget deployment failed"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Version: ${{ env.VERSION }}"
          echo "Check workflow logs for details"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
