name: Deploy DAOwidget (for DAOwidget directory)

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip ci]')"

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Verify SKILL.md exists
        run: |
          if [ ! -f SKILL.md ]; then
            echo ""
            echo "❌  SKILL.md not found!"
            echo ""
            echo "    Every crypto product must have SKILL.md — a guide for AI agents."
            echo "    Create SKILL.md with these sections:"
            echo ""
            echo "      ## What is this project   — description, live URL, repo link"
            echo "      ## Stack                  — tech stack (frontend, contracts, hosting)"
            echo "      ## Repository structure   — key files/dirs and their purpose"
            echo "      ## Build & Deploy         — build commands, CI pipeline, server paths"
            echo "      ## Common tasks           — how to add networks, update contracts, fund farms"
            echo "      ## Troubleshooting        — known errors and fixes"
            echo ""
            echo "    Example: https://github.com/noxonsu/farmfactory/blob/main/SKILL.md"
            echo ""
            exit 1
          fi
          echo "✓ SKILL.md found"

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '16'

      - name: Generate version
        id: version
        run: |
          VERSION="2.$(date -u +%y.%m%d)"
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Generated version: $VERSION"

      - name: Update version in daofactory.php
        run: |
          sed -i "s/Version: .*/Version: ${{ env.VERSION }}/" daofactory.php
          echo "Updated version in daofactory.php to ${{ env.VERSION }}"
          grep "Version:" daofactory.php

      - name: Install dependencies
        run: npm install

      - name: Build
        env:
          CI: false
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -d "build" ]; then
            echo "Error: build directory not found"
            exit 1
          fi
          if [ ! -f "build/index.html" ]; then
            echo "Error: build/index.html not found"
            exit 1
          fi
          echo "Build output verified"

      - name: Create info.json
        run: |
          cat > info.json << EOF
          {
            "name": "DAO Factory",
            "version": "${{ env.VERSION }}",
            "tested": "6.4",
            "requires": "5.0",
            "requires_php": "7.1",
            "download_url": "https://farm.wpmix.net/updates/DAOwidget-v${{ env.VERSION }}.zip",
            "last_updated": "$(date -u +"%Y-%m-%d %H:%M:%S")",
            "sections": {
              "description": "Governance and proposals plugin for cryptocurrency tokens - create DAOs and voting mechanisms",
              "installation": "Upload the plugin files to /wp-content/plugins/DAOwidget/, then activate the plugin through the Plugins menu in WordPress",
              "changelog": "<h4>${{ env.VERSION }}</h4><ul><li>$(echo '${{ github.event.head_commit.message }}' | head -1)</li></ul>"
            }
          }
          EOF

          echo "Generated info.json:"
          cat info.json

      - name: Create WordPress plugin package
        run: |
          echo "Creating WordPress plugin package for DAOwidget..."

          # Create package directory with plugin subdirectory (WordPress standard)
          mkdir -p daowidget-package/DAOwidget

          # Copy main plugin file from root
          echo "Copying main plugin file..."
          cp daofactory.php daowidget-package/DAOwidget/

          # Copy React build
          echo "Copying React build..."
          cp -r build daowidget-package/DAOwidget/

          # Copy src directory
          if [ -d "src" ]; then
            echo "Copying src directory..."
            cp -r src daowidget-package/DAOwidget/
          fi

          # Copy inc directory
          if [ -d "inc" ]; then
            echo "Copying inc directory..."
            cp -r inc daowidget-package/DAOwidget/
          fi

          # Copy lang directory if exists
          if [ -d "lang" ]; then
            echo "Copying lang directory..."
            cp -r lang daowidget-package/DAOwidget/
          fi

          # Copy assets from wordpress if exists
          if [ -d "wordpress/assets" ]; then
            echo "Copying assets..."
            mkdir -p daowidget-package/DAOwidget/assets
            cp -r wordpress/assets/* daowidget-package/DAOwidget/assets/
          fi

          # Copy templates
          if [ -d "templates" ]; then
            cp -r templates daowidget-package/DAOwidget/
          fi

          # Copy additional files
          if [ -f "README.md" ]; then
            cp README.md daowidget-package/DAOwidget/
          fi
          if [ -f "LICENSE" ]; then
            cp LICENSE daowidget-package/DAOwidget/
          fi

          # Verify structure
          echo "Package structure:"
          ls -la daowidget-package/DAOwidget/ | head -20

          # Create ZIP (from package directory, so DAOwidget/ is the root in ZIP)
          cd daowidget-package
          zip -r ../DAOwidget-v${{ env.VERSION }}.zip DAOwidget
          cd ..

          # Verify ZIP
          if [ ! -f "DAOwidget-v${{ env.VERSION }}.zip" ]; then
            echo "Error: ZIP file not created"
            exit 1
          fi

          echo "Package created: DAOwidget-v${{ env.VERSION }}.zip"
          ls -lh DAOwidget-v${{ env.VERSION }}.zip
          echo "ZIP contents:"
          unzip -l DAOwidget-v${{ env.VERSION }}.zip | head -30

      - name: Upload WordPress plugin to server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "DAOwidget-v${{ env.VERSION }}.zip,info.json"
          target: "/home/farmFactory/incoming/"

      - name: Update info.json on server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p /var/www/html/daowidget
            cp /home/farmFactory/incoming/info.json /var/www/html/daowidget/info.json
            chmod 644 /var/www/html/daowidget/info.json
            echo "info.json updated"
            cat /var/www/html/daowidget/info.json

      - name: Deploy WordPress plugin ZIP to updates directory
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            mkdir -p /home/farmFactory/web/farm.wpmix.net/public_html/updates
            mv /home/farmFactory/incoming/DAOwidget-v${{ env.VERSION }}.zip \
               /home/farmFactory/web/farm.wpmix.net/public_html/updates/
            chmod 644 /home/farmFactory/web/farm.wpmix.net/public_html/updates/DAOwidget-v${{ env.VERSION }}.zip
            echo "WordPress plugin package deployed:"
            ls -lh /home/farmFactory/web/farm.wpmix.net/public_html/updates/DAOwidget-v${{ env.VERSION }}.zip
